<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<title>ValuePitch - Finance & Journey</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<style>
  [x-cloak] { display: none !important; }
  .sidebar-transition { transition: width 0.2s ease, transform 0.2s ease; }
  .toast-enter { animation: slideIn 0.3s ease; }
  .toast-exit { animation: slideOut 0.3s ease forwards; }
  @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
  @keyframes slideOut { from { transform: translateX(0); opacity: 1; } to { transform: translateX(100%); opacity: 0; } }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  .fade-in { animation: fadeIn 0.3s ease; }
  .drop-zone.drag-over { border-color: #3b82f6; background-color: #eff6ff; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
  .spinner { border: 3px solid #e5e7eb; border-top-color: #3b82f6; border-radius: 50%; width: 40px; height: 40px; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(0.5); }
  /* Mobile bottom nav safe area */
  .bottom-nav { padding-bottom: env(safe-area-inset-bottom, 8px); }
  /* Pulse animation for active journey */
  .pulse-dot { animation: pulse 2s infinite; }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
  /* Mobile card touch feedback */
  .touch-card { transition: transform 0.1s; }
  .touch-card:active { transform: scale(0.98); }
</style>
</head>
<body class="bg-gray-50 min-h-screen">

<div id="app"></div>

<div id="toast-container" class="fixed top-4 right-4 z-[9999] flex flex-col gap-2"></div>

<div id="modal-container" class="hidden fixed inset-0 z-[9998] flex items-center justify-center bg-black/50">
  <div id="modal-content" class="bg-white rounded-xl shadow-2xl max-w-lg w-full mx-4 max-h-[90vh] overflow-y-auto"></div>
</div>

<script>
const API = '';
const CATEGORIES = ['Office Supplies','Software & SaaS','Travel & Transport','Food & Beverages','Utilities','Rent & Lease','Professional Services','Marketing & Advertising','Equipment','Maintenance & Repairs','Insurance','Telecommunications','Raw Materials','Logistics & Shipping','Salary & Wages','Medical & Healthcare','Legal & Compliance','Training & Education','Miscellaneous'];
const LEAD_STATUSES = ['new','contacted','follow_up','qualified','converted','lost'];
const ROLES = [
  { value: 'admin', label: 'Admin' },
  { value: 'finance_manager', label: 'Finance Manager' },
  { value: 'operations_manager', label: 'Operations Manager' },
  { value: 'branch_manager', label: 'Branch Manager' },
  { value: 'relation_manager', label: 'Relation Manager' },
  { value: 'user', label: 'User' },
];

let state = {
  user: null,
  token: localStorage.getItem('cm_token'),
  sidebarOpen: window.innerWidth > 768,
  newClaimDropdown: false,
};

function formatINR(n) {
  if (n == null || isNaN(n)) return '\u20B90';
  const num = Number(n);
  const s = Math.abs(num).toFixed(2);
  const [intPart, dec] = s.split('.');
  let result = '';
  const len = intPart.length;
  if (len <= 3) { result = intPart; }
  else {
    result = intPart.slice(-3);
    let remaining = intPart.slice(0, -3);
    while (remaining.length > 2) { result = remaining.slice(-2) + ',' + result; remaining = remaining.slice(0, -2); }
    if (remaining.length > 0) result = remaining + ',' + result;
  }
  return (num < 0 ? '-' : '') + '\u20B9' + result + (dec !== '00' ? '.' + dec : '');
}

function formatDate(d) {
  if (!d) return '-';
  try { const date = new Date(d); if (isNaN(date.getTime())) return d; return date.toLocaleDateString('en-IN', { day: '2-digit', month: 'short', year: 'numeric' }); }
  catch { return d; }
}

function formatTime(d) {
  if (!d) return '-';
  try { return new Date(d).toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit' }); }
  catch { return d; }
}

function statusBadge(status) {
  const colors = { pending: 'bg-yellow-100 text-yellow-800', approved: 'bg-green-100 text-green-800', rejected: 'bg-red-100 text-red-800' };
  return `<span class="px-2.5 py-1 rounded-full text-xs font-semibold ${colors[status] || 'bg-gray-100 text-gray-800'}">${(status || 'unknown').charAt(0).toUpperCase() + (status || '').slice(1)}</span>`;
}

function leadStatusBadge(status) {
  const colors = { new: 'bg-blue-100 text-blue-800', contacted: 'bg-indigo-100 text-indigo-800', follow_up: 'bg-yellow-100 text-yellow-800', qualified: 'bg-purple-100 text-purple-800', converted: 'bg-green-100 text-green-800', lost: 'bg-red-100 text-red-800' };
  const labels = { new: 'New', contacted: 'Contacted', follow_up: 'Follow Up', qualified: 'Qualified', converted: 'Converted', lost: 'Lost' };
  return `<span class="px-2.5 py-1 rounded-full text-xs font-semibold ${colors[status] || 'bg-gray-100 text-gray-800'}">${labels[status] || status}</span>`;
}

function roleBadge(role) {
  const colors = { admin: 'bg-purple-100 text-purple-700', finance_manager: 'bg-emerald-100 text-emerald-700', operations_manager: 'bg-orange-100 text-orange-700', branch_manager: 'bg-cyan-100 text-cyan-700', relation_manager: 'bg-pink-100 text-pink-700', user: 'bg-gray-100 text-gray-600' };
  const labels = { admin: 'Admin', finance_manager: 'Finance Mgr', operations_manager: 'Ops Mgr', branch_manager: 'Branch Mgr', relation_manager: 'Relation Mgr', user: 'User' };
  return `<span class="text-xs ${colors[role] || 'bg-gray-100 text-gray-600'} px-2 py-0.5 rounded font-medium">${labels[role] || role}</span>`;
}

function showToast(message, type = 'success') {
  const container = document.getElementById('toast-container');
  const colors = { success: 'bg-green-600', error: 'bg-red-600', info: 'bg-blue-600' };
  const icons = { success: 'check-circle', error: 'alert-circle', info: 'info' };
  const el = document.createElement('div');
  el.className = `toast-enter ${colors[type]} text-white px-4 py-3 rounded-lg shadow-lg flex items-center gap-2 min-w-[280px]`;
  el.innerHTML = `<i data-lucide="${icons[type]}" class="w-5 h-5"></i><span class="text-sm">${message}</span>`;
  container.appendChild(el);
  lucide.createIcons({ nodes: [el] });
  setTimeout(() => { el.classList.replace('toast-enter', 'toast-exit'); setTimeout(() => el.remove(), 300); }, 3500);
}

async function apiFetch(url, options = {}) {
  const headers = { ...options.headers };
  if (state.token) headers['Authorization'] = `Bearer ${state.token}`;
  if (!(options.body instanceof FormData)) headers['Content-Type'] = 'application/json';
  const res = await fetch(API + url, { ...options, headers, body: options.body instanceof FormData ? options.body : (options.body ? JSON.stringify(options.body) : undefined) });
  if (res.status === 401) { logout(); throw new Error('Session expired'); }
  const data = await res.json();
  if (!res.ok) throw new Error(data.error || 'Request failed');
  return data;
}

function logout() {
  state.token = null; state.user = null;
  localStorage.removeItem('cm_token'); localStorage.removeItem('cm_user');
  location.hash = '#login';
}

function navigate(hash) { location.hash = hash; }

function showModal(html) {
  document.getElementById('modal-content').innerHTML = html;
  document.getElementById('modal-container').classList.remove('hidden');
  lucide.createIcons({ nodes: [document.getElementById('modal-content')] });
}

function hideModal() {
  document.getElementById('modal-container').classList.add('hidden');
  document.getElementById('modal-content').innerHTML = '';
}

document.getElementById('modal-container').addEventListener('click', (e) => {
  if (e.target === document.getElementById('modal-container')) hideModal();
});

// Role helpers
function isAdmin() { return state.user?.role === 'admin'; }
function isFinance() { return ['admin', 'finance_manager'].includes(state.user?.role); }
function isOps() { return ['admin', 'operations_manager', 'branch_manager'].includes(state.user?.role); }
function hasJourneyAccess() { return state.user?.hasJourneyAccess || isAdmin() || isOps(); }
function isFieldUser() { return ['relation_manager', 'user'].includes(state.user?.role); }

// Geolocation helper
function getCurrentLocation() {
  return new Promise((resolve, reject) => {
    if (!navigator.geolocation) return reject(new Error('Geolocation not supported'));
    navigator.geolocation.getCurrentPosition(
      pos => resolve({ lat: pos.coords.latitude, lng: pos.coords.longitude }),
      err => resolve({ lat: 0, lng: 0 }), // Fallback to 0,0 if denied
      { enableHighAccuracy: true, timeout: 10000 }
    );
  });
}

async function init() {
  if (state.token) {
    try {
      const cached = localStorage.getItem('cm_user');
      if (cached) state.user = JSON.parse(cached);
      const user = await apiFetch('/api/me');
      state.user = user;
      localStorage.setItem('cm_user', JSON.stringify(user));
    } catch { logout(); return; }
  }
  if (!location.hash) {
    if (!state.token) location.hash = '#login';
    else if (isAdmin()) location.hash = '#dashboard';
    else if (isFinance()) location.hash = '#dashboard';
    else if (isOps()) location.hash = '#ops-dashboard';
    else if (hasJourneyAccess()) location.hash = '#journey-home';
    else location.hash = '#new-claim';
  }
  route();
}

window.addEventListener('hashchange', route);

function route() {
  const hash = location.hash || '#login';
  if (!state.token && hash !== '#login') { location.hash = '#login'; return; }
  if (state.token && hash === '#login') {
    if (isAdmin()) location.hash = '#dashboard';
    else if (isFinance()) location.hash = '#dashboard';
    else if (isOps()) location.hash = '#ops-dashboard';
    else if (hasJourneyAccess()) location.hash = '#journey-home';
    else location.hash = '#new-claim';
    return;
  }
  state.newClaimDropdown = false;
  if (hash === '#login') return renderLogin();
  renderLayout();
  const content = document.getElementById('content');
  if (!content) return;

  // Route mapping
  if (hash === '#dashboard') renderDashboard(content);
  else if (hash === '#claims') renderMyClaims(content);
  else if (hash === '#new-claim' || hash === '#upload-claim') renderNewClaim(content, 'upload');
  else if (hash === '#manual-claim') renderNewClaim(content, 'manual');
  else if (hash === '#approvals') renderApprovals(content);
  else if (hash === '#users') renderUsers(content);
  else if (hash.startsWith('#claim/')) renderClaimDetail(content, hash.split('/')[1]);
  // Journey routes
  else if (hash === '#journey-home') renderJourneyHome(content);
  else if (hash === '#journey-history') renderJourneyHistory(content);
  else if (hash === '#my-leads') renderMyLeads(content);
  else if (hash.startsWith('#journey/')) renderJourneyDetail(content, hash.split('/')[1]);
  else if (hash.startsWith('#lead/')) renderLeadDetail(content, hash.split('/')[1]);
  // Ops routes
  else if (hash === '#ops-dashboard') renderOpsDashboard(content);
  else if (hash === '#all-journeys') renderAllJourneys(content);
  else if (hash === '#all-leads') renderAllLeads(content);
  else {
    if (isAdmin()) renderDashboard(content);
    else if (isFinance()) renderDashboard(content);
    else if (isOps()) renderOpsDashboard(content);
    else if (hasJourneyAccess()) renderJourneyHome(content);
    else renderNewClaim(content, 'upload');
  }
}

function renderLogin() {
  document.getElementById('app').innerHTML = `
  <div class="min-h-screen flex items-center justify-center bg-gradient-to-br from-slate-900 via-blue-900 to-slate-900 p-4">
    <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md p-8">
      <div class="text-center mb-8">
        <div class="w-16 h-16 bg-blue-600 rounded-2xl flex items-center justify-center mx-auto mb-4">
          <i data-lucide="building-2" class="w-8 h-8 text-white"></i>
        </div>
        <h1 class="text-2xl font-bold text-gray-900">ValuePitch</h1>
        <p class="text-gray-500 mt-1">Finance & Journey Tracker</p>
      </div>
      <form id="loginForm" class="space-y-5">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1.5">Username</label>
          <div class="relative">
            <i data-lucide="user" class="absolute left-3 top-1/2 -translate-y-1/2 w-5 h-5 text-gray-400"></i>
            <input type="text" id="loginUser" class="w-full pl-10 pr-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none text-base" placeholder="Enter username" required autocomplete="username">
          </div>
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1.5">Password</label>
          <div class="relative">
            <i data-lucide="lock" class="absolute left-3 top-1/2 -translate-y-1/2 w-5 h-5 text-gray-400"></i>
            <input type="password" id="loginPass" class="w-full pl-10 pr-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none text-base" placeholder="Enter password" required autocomplete="current-password">
          </div>
        </div>
        <button type="submit" id="loginBtn" class="w-full bg-blue-600 text-white py-3 rounded-xl font-semibold hover:bg-blue-700 transition flex items-center justify-center gap-2 text-base">
          <span>Sign In</span>
        </button>
        <p id="loginError" class="text-red-500 text-sm text-center hidden"></p>
      </form>
    </div>
  </div>`;
  lucide.createIcons();
  document.getElementById('loginForm').onsubmit = async (e) => {
    e.preventDefault();
    const btn = document.getElementById('loginBtn');
    const errEl = document.getElementById('loginError');
    errEl.classList.add('hidden');
    btn.disabled = true; btn.innerHTML = '<div class="spinner" style="width:20px;height:20px;border-width:2px;"></div>';
    try {
      const data = await apiFetch('/api/login', { method: 'POST', body: { username: document.getElementById('loginUser').value, password: document.getElementById('loginPass').value } });
      state.token = data.token; state.user = data.user;
      localStorage.setItem('cm_token', data.token);
      localStorage.setItem('cm_user', JSON.stringify(data.user));
      showToast('Welcome, ' + data.user.name);
      if (['admin', 'finance_manager'].includes(data.user.role)) location.hash = '#dashboard';
      else if (['operations_manager', 'branch_manager'].includes(data.user.role)) location.hash = '#ops-dashboard';
      else if (data.user.hasJourneyAccess) location.hash = '#journey-home';
      else location.hash = '#new-claim';
    } catch (err) {
      errEl.textContent = err.message; errEl.classList.remove('hidden');
      btn.disabled = false; btn.innerHTML = '<span>Sign In</span>';
    }
  };
}

function renderLayout() {
  const user = state.user || {};
  const hash = location.hash;
  const usesMobileLayout = isFieldUser() || (hasJourneyAccess() && !isAdmin() && !isFinance() && !isOps());

  if (usesMobileLayout) {
    // Mobile-friendly bottom nav for field users
    const tabs = [];
    if (hasJourneyAccess()) tabs.push({ id: '#journey-home', icon: 'compass', label: 'Journey' });
    if (hasJourneyAccess()) tabs.push({ id: '#my-leads', icon: 'users', label: 'Leads' });
    tabs.push({ id: '#new-claim', icon: 'plus-circle', label: 'Claim' });
    tabs.push({ id: '#claims', icon: 'file-text', label: 'Claims' });
    if (user.canApprove) tabs.push({ id: '#approvals', icon: 'check-square', label: 'Approve' });

    document.getElementById('app').innerHTML = `
    <div class="min-h-screen flex flex-col pb-20">
      <header class="bg-white border-b border-gray-200 sticky top-0 z-30">
        <div class="px-4 py-3 flex items-center justify-between">
          <div class="flex items-center gap-2.5">
            <div class="w-9 h-9 bg-blue-600 rounded-xl flex items-center justify-center">
              <i data-lucide="building-2" class="w-5 h-5 text-white"></i>
            </div>
            <div>
              <h1 class="font-bold text-base text-gray-900">ValuePitch</h1>
              <p class="text-xs text-gray-500">${user.name || ''}</p>
            </div>
          </div>
          <button onclick="logout()" class="p-2 rounded-lg hover:bg-gray-100 transition text-gray-400 hover:text-red-500" title="Sign Out">
            <i data-lucide="log-out" class="w-5 h-5"></i>
          </button>
        </div>
      </header>
      <div id="content" class="flex-1 p-4 overflow-y-auto bg-gray-50"></div>
      <nav class="bottom-nav fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 z-30 flex justify-around px-2 pt-2 pb-2">
        ${tabs.map(t => {
          const active = hash === t.id || (t.id === '#new-claim' && (hash === '#upload-claim' || hash === '#manual-claim'));
          return `<a href="${t.id}" class="flex flex-col items-center gap-0.5 px-3 py-1.5 rounded-lg ${active ? 'text-blue-600' : 'text-gray-400'}">
            <i data-lucide="${t.icon}" class="w-5 h-5"></i>
            <span class="text-[10px] font-medium">${t.label}</span>
          </a>`;
        }).join('')}
      </nav>
    </div>`;
  } else {
    // Desktop sidebar layout for admin/finance/ops
    const navItems = [];
    if (isFinance()) navItems.push({ id: '#dashboard', icon: 'layout-dashboard', label: 'Finance Dashboard' });
    if (isOps()) navItems.push({ id: '#ops-dashboard', icon: 'map-pin', label: 'Ops Dashboard' });
    if (isOps()) navItems.push({ id: '#all-journeys', icon: 'route', label: 'All Journeys' });
    if (isOps()) navItems.push({ id: '#all-leads', icon: 'contact', label: 'All Leads' });
    if (hasJourneyAccess()) navItems.push({ id: '#journey-home', icon: 'compass', label: 'My Journey' });
    navItems.push({ id: '#new-claim', icon: 'plus-circle', label: 'New Claim' });
    navItems.push({ id: '#claims', icon: 'file-text', label: 'My Claims' });
    if (user.canApprove || isFinance()) navItems.push({ id: '#approvals', icon: 'check-square', label: 'Approvals' });
    if (isAdmin()) navItems.push({ id: '#users', icon: 'users', label: 'Users' });

    document.getElementById('app').innerHTML = `
    <div class="flex min-h-screen">
      <div id="sidebar-overlay" class="fixed inset-0 bg-black/50 z-40 lg:hidden ${state.sidebarOpen ? '' : 'hidden'}" onclick="toggleSidebar()"></div>
      <aside id="sidebar" class="sidebar-transition fixed lg:static inset-y-0 left-0 z-50 w-64 bg-slate-900 text-white flex flex-col ${state.sidebarOpen ? 'translate-x-0' : '-translate-x-full lg:translate-x-0 lg:w-64'}">
        <div class="p-5 border-b border-slate-700/50">
          <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center flex-shrink-0">
              <i data-lucide="building-2" class="w-5 h-5"></i>
            </div>
            <div class="overflow-hidden">
              <h1 class="font-bold text-lg leading-tight">ValuePitch</h1>
              <p class="text-slate-400 text-xs truncate">${user.name || ''} - ${ROLES.find(r => r.value === user.role)?.label || user.role}</p>
            </div>
          </div>
        </div>
        <nav class="flex-1 py-4 px-3 space-y-1 overflow-y-auto">
          ${navItems.map(n => {
            const active = hash === n.id || (n.id === '#new-claim' && (hash === '#upload-claim' || hash === '#manual-claim'));
            return `<a href="${n.id}" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium ${active ? 'bg-blue-600 text-white' : 'text-slate-300 hover:text-white hover:bg-slate-800'} transition">
              <i data-lucide="${n.icon}" class="w-5 h-5"></i><span>${n.label}</span>
            </a>`;
          }).join('')}
        </nav>
        <div class="p-3 border-t border-slate-700/50">
          <button onclick="logout()" class="w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium text-slate-300 hover:text-red-400 hover:bg-slate-800 transition">
            <i data-lucide="log-out" class="w-5 h-5"></i><span>Sign Out</span>
          </button>
        </div>
      </aside>
      <main class="flex-1 flex flex-col min-w-0">
        <header class="bg-white border-b border-gray-200 px-4 lg:px-6 py-3 flex items-center justify-between sticky top-0 z-30">
          <button onclick="toggleSidebar()" class="lg:hidden p-2 rounded-lg hover:bg-gray-100">
            <i data-lucide="menu" class="w-5 h-5 text-gray-600"></i>
          </button>
          <div class="flex items-center gap-3 ml-auto">
            <div class="w-8 h-8 bg-blue-100 rounded-full flex items-center justify-center">
              <span class="text-blue-700 text-sm font-semibold">${(user.name || 'U').charAt(0).toUpperCase()}</span>
            </div>
            <div class="hidden sm:block">
              <p class="text-sm font-medium text-gray-900">${user.name || ''}</p>
              <p class="text-xs text-gray-500">${ROLES.find(r => r.value === user.role)?.label || user.role}</p>
            </div>
          </div>
        </header>
        <div id="content" class="flex-1 p-4 lg:p-6 overflow-y-auto"></div>
      </main>
    </div>`;
  }
  lucide.createIcons();
}

window.toggleSidebar = () => {
  state.sidebarOpen = !state.sidebarOpen;
  const sidebar = document.getElementById('sidebar');
  const overlay = document.getElementById('sidebar-overlay');
  if (state.sidebarOpen) { sidebar?.classList.remove('-translate-x-full'); sidebar?.classList.add('translate-x-0'); overlay?.classList.remove('hidden'); }
  else { sidebar?.classList.add('-translate-x-full'); sidebar?.classList.remove('translate-x-0'); overlay?.classList.add('hidden'); }
};

// ===== FINANCE DASHBOARD =====
async function renderDashboard(container) {
  if (!isFinance()) { container.innerHTML = '<p class="text-gray-500 p-4">Finance access required.</p>'; return; }
  container.innerHTML = '<div class="flex items-center justify-center py-20"><div class="spinner"></div></div>';
  try {
    const stats = await apiFetch('/api/stats');
    container.innerHTML = `
    <div class="mb-6"><h2 class="text-2xl font-bold text-gray-900">Finance Dashboard</h2><p class="text-gray-500 text-sm mt-1">Overview of all claims</p></div>
    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 mb-6">
      ${statCard('Total Claims', stats.totalInvoices, 'file-text', 'blue')}
      ${statCard('Pending', stats.pendingInvoices, 'clock', 'yellow', formatINR(stats.pendingAmount))}
      ${statCard('Approved', stats.approvedInvoices, 'check-circle', 'green', formatINR(stats.totalExpenses))}
      ${statCard('Rejected', stats.rejectedInvoices, 'x-circle', 'red')}
    </div>
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-6">
      <div class="bg-white rounded-xl border border-gray-200 p-5"><h3 class="font-semibold text-gray-900 mb-4">Claims by Category</h3><div style="height:280px"><canvas id="catChart"></canvas></div></div>
      <div class="bg-white rounded-xl border border-gray-200 p-5"><h3 class="font-semibold text-gray-900 mb-4">Monthly Approved Amount</h3><div style="height:280px"><canvas id="monthChart"></canvas></div></div>
    </div>
    <div class="bg-white rounded-xl border border-gray-200 p-5">
      <h3 class="font-semibold text-gray-900 mb-4">Recent Pending Claims</h3>

    if (stats.byCategory.length > 0) new Chart(document.getElementById('catChart'), { type: 'doughnut', data: { labels: stats.byCategory.map(c => c._id || 'Unknown'), datasets: [{ data: stats.byCategory.map(c => c.total), backgroundColor: catColors.slice(0, stats.byCategory.length), borderWidth: 0 }] }, options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'right', labels: { boxWidth: 12, padding: 8, font: { size: 11 } } } } } });
    if (stats.byMonth.length > 0) new Chart(document.getElementById('monthChart'), { type: 'bar', data: { labels: stats.byMonth.map(m => m._id), datasets: [{ label: 'Approved Amount', data: stats.byMonth.map(m => m.total), backgroundColor: '#3b82f6', borderRadius: 6 }] }, options: { responsive: true, maintainAspectRatio: false, scales: { y: { beginAtZero: true, ticks: { callback: v => formatINR(v) } } }, plugins: { legend: { display: false } } } });

}

function statCard(label, value, icon, color, subtitle) {
  const bg = { blue: 'bg-blue-50', yellow: 'bg-yellow-50', green: 'bg-green-50', red: 'bg-red-50', purple: 'bg-purple-50', orange: 'bg-orange-50', cyan: 'bg-cyan-50' };
  const text = { blue: 'text-blue-600', yellow: 'text-yellow-600', green: 'text-green-600', red: 'text-red-600', purple: 'text-purple-600', orange: 'text-orange-600', cyan: 'text-cyan-600' };
  return `<div class="bg-white rounded-xl border border-gray-200 p-5">
    <div class="flex items-center justify-between mb-3"><span class="text-sm font-medium text-gray-500">${label}</span><div class="w-10 h-10 ${bg[color]} rounded-lg flex items-center justify-center"><i data-lucide="${icon}" class="w-5 h-5 ${text[color]}"></i></div></div>
    <p class="text-2xl font-bold text-gray-900">${value}</p>
    ${subtitle ? `<p class="text-sm text-gray-500 mt-1">${subtitle}</p>` : ''}
  </div>`;
}

window.filterClaims = () => {
  const filter = document.getElementById('statusFilter').value;
  document.querySelectorAll('.claim-row').forEach(row => { row.style.display = (!filter || row.dataset.status === filter) ? '' : 'none'; });
};

// ===== NEW CLAIM =====
function renderNewClaim(container, mode = 'upload') {
  container.innerHTML = `
  <div class="max-w-2xl mx-auto">
    <div class="mb-6"><h2 class="text-xl font-bold text-gray-900">New Claim</h2><p class="text-gray-500 text-sm mt-1">Upload invoice or enter manually</p></div>
    <div class="bg-white rounded-xl border border-gray-200 p-1.5 flex mb-6">
      <button id="toggleUpload" onclick="switchClaimMode('upload')" class="flex-1 flex items-center justify-center gap-2 py-2.5 rounded-lg text-sm font-semibold transition ${mode === 'upload' ? 'bg-blue-600 text-white shadow-sm' : 'text-gray-500 hover:text-gray-700 hover:bg-gray-50'}">
        <i data-lucide="upload-cloud" class="w-4 h-4"></i> Upload Invoice
      </button>
      <button id="toggleManual" onclick="switchClaimMode('manual')" class="flex-1 flex items-center justify-center gap-2 py-2.5 rounded-lg text-sm font-semibold transition ${mode === 'manual' ? 'bg-blue-600 text-white shadow-sm' : 'text-gray-500 hover:text-gray-700 hover:bg-gray-50'}">
        <i data-lucide="edit-3" class="w-4 h-4"></i> Manual Entry
      </button>
    </div>
    <div id="uploadSection" class="${mode === 'upload' ? '' : 'hidden'}">
      <div class="bg-white rounded-xl border border-gray-200 p-6">
        <div id="dropZone" class="drop-zone border-2 border-dashed border-gray-300 rounded-xl p-10 text-center cursor-pointer hover:border-blue-400 hover:bg-blue-50/50 transition">
          <i data-lucide="upload-cloud" class="w-12 h-12 text-gray-400 mx-auto mb-3"></i>
          <p class="text-gray-700 font-medium">Drop invoice or click to browse</p>
          <p class="text-gray-400 text-sm mt-1">JPG, PNG, PDF up to 10MB</p>
          <input type="file" id="fileInput" accept="image/*,.pdf" class="hidden">
        </div>
        <div id="uploadPreview" class="hidden mt-4"><div class="flex items-center gap-3 p-3 bg-gray-50 rounded-lg"><i data-lucide="file" class="w-5 h-5 text-blue-600"></i><span id="fileName" class="text-sm text-gray-700 flex-1 truncate"></span><button onclick="clearUpload()" class="text-gray-400 hover:text-red-500"><i data-lucide="x" class="w-4 h-4"></i></button></div></div>
        <div id="uploadProgress" class="hidden mt-6"><div class="flex flex-col items-center py-6"><div class="spinner mb-3"></div><p class="text-gray-600 font-medium">Processing with AI...</p></div></div>
        <button id="uploadBtn" onclick="submitUpload()" disabled class="mt-4 w-full bg-blue-600 text-white py-3 rounded-xl font-semibold hover:bg-blue-700 transition disabled:opacity-50 disabled:cursor-not-allowed flex items-center justify-center gap-2">
          <i data-lucide="upload" class="w-4 h-4"></i> Upload & Extract
        </button>
      </div>
      <div id="uploadResult" class="hidden mt-6"></div>
    </div>
    <div id="manualSection" class="${mode === 'manual' ? '' : 'hidden'}">
      <form id="manualClaimForm" class="bg-white rounded-xl border border-gray-200 p-6 space-y-5">
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
          <div><label class="block text-sm font-medium text-gray-700 mb-1.5">Vendor Name <span class="text-red-500">*</span></label><input type="text" id="mc_vendor" required class="w-full px-3 py-2.5 border border-gray-300 rounded-xl text-sm focus:ring-2 focus:ring-blue-500 outline-none" placeholder="e.g., Acme Corp"></div>
          <div><label class="block text-sm font-medium text-gray-700 mb-1.5">Invoice Number</label><input type="text" id="mc_invoiceNum" class="w-full px-3 py-2.5 border border-gray-300 rounded-xl text-sm focus:ring-2 focus:ring-blue-500 outline-none" placeholder="INV-001"></div>
        </div>
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
          <div><label class="block text-sm font-medium text-gray-700 mb-1.5">Invoice Date</label><input type="date" id="mc_invoiceDate" class="w-full px-3 py-2.5 border border-gray-300 rounded-xl text-sm focus:ring-2 focus:ring-blue-500 outline-none"></div>
          <div><label class="block text-sm font-medium text-gray-700 mb-1.5">Due Date</label><input type="date" id="mc_dueDate" class="w-full px-3 py-2.5 border border-gray-300 rounded-xl text-sm focus:ring-2 focus:ring-blue-500 outline-none"></div>
        </div>
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
          <div><label class="block text-sm font-medium text-gray-700 mb-1.5">Amount (INR) <span class="text-red-500">*</span></label><div class="relative"><span class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-500 text-sm">\u20B9</span><input type="number" id="mc_amount" required min="0" step="0.01" class="w-full pl-8 pr-3 py-2.5 border border-gray-300 rounded-xl text-sm focus:ring-2 focus:ring-blue-500 outline-none" placeholder="0.00"></div></div>
          <div><label class="block text-sm font-medium text-gray-700 mb-1.5">Category</label><select id="mc_category" class="w-full px-3 py-2.5 border border-gray-300 rounded-xl text-sm focus:ring-2 focus:ring-blue-500 outline-none">${CATEGORIES.map(c => `<option value="${c}">${c}</option>`).join('')}</select></div>
        </div>
        <div><label class="block text-sm font-medium text-gray-700 mb-1.5">Notes</label><textarea id="mc_notes" rows="3" class="w-full px-3 py-2.5 border border-gray-300 rounded-xl text-sm focus:ring-2 focus:ring-blue-500 outline-none resize-none" placeholder="Additional details..."></textarea></div>
        <button type="submit" id="manualSubmitBtn" class="w-full bg-blue-600 text-white py-3 rounded-xl font-semibold hover:bg-blue-700 transition flex items-center justify-center gap-2">
          <i data-lucide="send" class="w-4 h-4"></i> Submit Claim
        </button>
      </form>
    </div>
  </div>`;
  lucide.createIcons();

  window.switchClaimMode = (m) => {
    document.getElementById('uploadSection').classList.toggle('hidden', m !== 'upload');
    document.getElementById('manualSection').classList.toggle('hidden', m !== 'manual');
    document.getElementById('toggleUpload').className = `flex-1 flex items-center justify-center gap-2 py-2.5 rounded-lg text-sm font-semibold transition ${m === 'upload' ? 'bg-blue-600 text-white shadow-sm' : 'text-gray-500 hover:text-gray-700 hover:bg-gray-50'}`;
    document.getElementById('toggleManual').className = `flex-1 flex items-center justify-center gap-2 py-2.5 rounded-lg text-sm font-semibold transition ${m === 'manual' ? 'bg-blue-600 text-white shadow-sm' : 'text-gray-500 hover:text-gray-700 hover:bg-gray-50'}`;
  };

  const dropZone = document.getElementById('dropZone');
  const fileInput = document.getElementById('fileInput');
  let selectedFile = null;
  dropZone.onclick = () => fileInput.click();
  dropZone.ondragover = (e) => { e.preventDefault(); dropZone.classList.add('drag-over'); };
  dropZone.ondragleave = () => dropZone.classList.remove('drag-over');
  dropZone.ondrop = (e) => { e.preventDefault(); dropZone.classList.remove('drag-over'); handleFile(e.dataTransfer.files[0]); };
  fileInput.onchange = () => { if (fileInput.files[0]) handleFile(fileInput.files[0]); };
  function handleFile(file) { if (!file) return; selectedFile = file; document.getElementById('fileName').textContent = file.name; document.getElementById('uploadPreview').classList.remove('hidden'); document.getElementById('uploadBtn').disabled = false; }
  window.clearUpload = () => { selectedFile = null; fileInput.value = ''; document.getElementById('uploadPreview').classList.add('hidden'); document.getElementById('uploadBtn').disabled = true; };
  window.submitUpload = async () => {
    if (!selectedFile) return;
    const btn = document.getElementById('uploadBtn'); const progress = document.getElementById('uploadProgress');
    btn.disabled = true; progress.classList.remove('hidden');
    try {
      const fd = new FormData(); fd.append('invoice', selectedFile);
      const result = await apiFetch('/api/invoices/upload', { method: 'POST', body: fd });
      progress.classList.add('hidden'); showToast('Invoice processed');
      document.getElementById('uploadResult').classList.remove('hidden');
      document.getElementById('uploadResult').innerHTML = `<div class="bg-white rounded-xl border border-gray-200 p-6"><div class="flex items-center gap-2 mb-4"><i data-lucide="check-circle" class="w-5 h-5 text-green-600"></i><h3 class="font-semibold text-gray-900">Extracted</h3></div><div class="grid grid-cols-2 gap-4 text-sm"><div><span class="text-gray-500">Vendor</span><p class="font-medium">${esc(result.vendorName || '-')}</p></div><div><span class="text-gray-500">Amount</span><p class="font-medium">${formatINR(result.totalAmount)}</p></div><div><span class="text-gray-500">Category</span><p class="font-medium">${esc(result.category || '-')}</p></div><div><span class="text-gray-500">Status</span><p>${statusBadge(result.status)}</p></div></div><a href="#claim/${result._id}" class="mt-4 inline-block bg-blue-600 text-white px-4 py-2 rounded-lg text-sm font-medium hover:bg-blue-700">View Claim</a></div>`;
      lucide.createIcons({ nodes: [document.getElementById('uploadResult')] });
    } catch (err) { progress.classList.add('hidden'); btn.disabled = false; showToast(err.message, 'error'); }
  };

  document.getElementById('manualClaimForm').onsubmit = async (e) => {
    e.preventDefault();
    const btn = document.getElementById('manualSubmitBtn');
    btn.disabled = true; btn.innerHTML = '<div class="spinner" style="width:20px;height:20px;border-width:2px;"></div>';
    try {
      const result = await apiFetch('/api/claims/manual', { method: 'POST', body: {
        vendorName: document.getElementById('mc_vendor').value, invoiceNumber: document.getElementById('mc_invoiceNum').value,
        invoiceDate: document.getElementById('mc_invoiceDate').value, dueDate: document.getElementById('mc_dueDate').value,
        totalAmount: parseFloat(document.getElementById('mc_amount').value), category: document.getElementById('mc_category').value,
        notes: document.getElementById('mc_notes').value,
      }});
      showToast('Claim submitted'); location.hash = '#claim/' + result._id;
    } catch (err) { showToast(err.message, 'error'); btn.disabled = false; btn.innerHTML = '<i data-lucide="send" class="w-4 h-4"></i> Submit Claim'; lucide.createIcons({ nodes: [btn] }); }
  };
}

window.rejectClaim = async (id) => { try { await apiFetch(`/api/invoices/${id}/approve`, { method: 'PUT', body: { status: 'rejected', rejectionReason: document.getElementById('rejectReason')?.value || '' } }); hideModal(); showToast('Claim rejected'); route(); } catch (err) { showToast(err.message, 'error'); } };
window.editClaim = async (id) => {

    </div>
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-6">
      <div class="bg-white rounded-xl border border-gray-200 p-5">
        <h3 class="font-semibold text-gray-900 mb-3">By User</h3>
        ${stats.byUser.length === 0 ? '<p class="text-gray-400 text-sm">No data</p>' : `
        <div class="space-y-2">
          ${stats.byUser.map(u => `<div class="flex items-center justify-between p-3 bg-gray-50 rounded-lg">
            <div><p class="font-medium text-gray-900 text-sm">${esc(u._id)}</p><p class="text-xs text-gray-500">${u.journeys} days &middot; ${u.trips} trips</p></div>
            <div class="text-right"><p class="font-medium text-gray-900 text-sm">${u.leads} leads</p><p class="text-xs text-green-600">${u.converted} converted</p></div>
          </div>`).join('')}
        </div>`}
      </div>
      <div class="bg-white rounded-xl border border-gray-200 p-5">
        <h3 class="font-semibold text-gray-900 mb-3">Leads by Status</h3>
        ${stats.leadsByStatus.length === 0 ? '<p class="text-gray-400 text-sm">No data</p>' : `
        <div class="space-y-2">
          ${stats.leadsByStatus.map(s => `<div class="flex items-center justify-between p-2">
            ${leadStatusBadge(s._id)}<span class="font-bold text-gray-900">${s.count}</span>
          </div>`).join('')}
        </div>`}
      </div>
    </div>
    ${stats.recentJourneys.length > 0 ? `
    <div class="bg-white rounded-xl border border-gray-200 p-5">
      <div class="flex items-center justify-between mb-3"><h3 class="font-semibold text-gray-900">Recent Journeys</h3><a href="#all-journeys" class="text-blue-600 text-sm hover:underline">View All</a></div>
      <div class="overflow-x-auto"><table class="w-full text-sm"><thead><tr class="border-b border-gray-100 text-left text-gray-500">
        <th class="pb-3 font-medium">User</th><th class="pb-3 font-medium">Date</th><th class="pb-3 font-medium">Trips</th><th class="pb-3 font-medium">Leads</th><th class="pb-3 font-medium">Status</th><th class="pb-3"></th>
      </tr></thead><tbody>
        ${stats.recentJourneys.map(j => `<tr class="border-b border-gray-50 hover:bg-gray-50 cursor-pointer" onclick="location.hash='#journey/${j._id}'">
          <td class="py-3 font-medium text-gray-900">${esc(j.userName)}</td>
          <td class="py-3 text-gray-600">${j.date}</td>
          <td class="py-3 text-gray-600">${j.totalTrips}</td>
          <td class="py-3 text-gray-600">${j.totalLeads}</td>
          <td class="py-3"><span class="text-xs px-2 py-0.5 rounded ${j.status === 'active' ? 'bg-green-100 text-green-700' : 'bg-gray-100 text-gray-600'}">${j.status}</span></td>
          <td class="py-3"><i data-lucide="chevron-right" class="w-4 h-4 text-gray-400"></i></td>
        </tr>`).join('')}
      </tbody></table></div>
    </div>` : ''}`;
    lucide.createIcons();
  } catch (err) { container.innerHTML = `<p class="text-red-500 p-4">${esc(err.message)}</p>`; }
}


// ===== ALL JOURNEYS (Ops) =====
async function renderAllJourneys(container) {
  if (!isOps()) { container.innerHTML = '<p class="text-gray-500 p-4">Access denied</p>'; return; }
  container.innerHTML = '<div class="flex items-center justify-center py-20"><div class="spinner"></div></div>';
  try {
    const journeys = await apiFetch('/api/journeys');
    container.innerHTML = `
    <div class="mb-6"><h2 class="text-2xl font-bold text-gray-900">All Journeys</h2><p class="text-gray-500 text-sm mt-1">${journeys.length} total</p></div>
    <div class="bg-white rounded-xl border border-gray-200 overflow-hidden">
      <div class="overflow-x-auto"><table class="w-full text-sm"><thead><tr class="bg-gray-50 border-b border-gray-200 text-left text-gray-500">
        <th class="px-5 py-3 font-medium">User</th><th class="px-5 py-3 font-medium">Date</th><th class="px-5 py-3 font-medium">Trips</th><th class="px-5 py-3 font-medium">Leads</th><th class="px-5 py-3 font-medium">Distance</th><th class="px-5 py-3 font-medium">Status</th><th class="px-5 py-3"></th>
      </tr></thead><tbody>
        ${journeys.map(j => `<tr class="border-b border-gray-50 hover:bg-gray-50 cursor-pointer" onclick="location.hash='#journey/${j._id}'">
          <td class="px-5 py-3.5 font-medium text-gray-900">${esc(j.userName)}</td>
          <td class="px-5 py-3.5 text-gray-600">${j.date}</td>
          <td class="px-5 py-3.5 text-gray-600">${j.totalTrips}</td>
          <td class="px-5 py-3.5 text-gray-600">${j.totalLeads}</td>
          <td class="px-5 py-3.5 text-blue-600 font-medium">${j.distanceKm ? j.distanceKm + ' km' : (j.totalTripDistance ? j.totalTripDistance + ' km' : '-')}</td>
          <td class="px-5 py-3.5"><span class="text-xs px-2 py-0.5 rounded ${j.status === 'active' ? 'bg-green-100 text-green-700' : 'bg-gray-100 text-gray-600'}">${j.status}</span></td>
          <td class="px-5 py-3.5"><i data-lucide="chevron-right" class="w-4 h-4 text-gray-400"></i></td>
        </tr>`).join('')}
      </tbody></table></div>
    </div>`;
    lucide.createIcons();
  } catch (err) { container.innerHTML = `<p class="text-red-500 p-4">${esc(err.message)}</p>`; }
}


// ===== ALL LEADS (Ops) =====
async function renderAllLeads(container) {
  if (!isOps()) { container.innerHTML = '<p class="text-gray-500 p-4">Access denied</p>'; return; }
  container.innerHTML = '<div class="flex items-center justify-center py-20"><div class="spinner"></div></div>';
  try {
    const leads = await apiFetch('/api/leads');
    container.innerHTML = `
    <div class="flex flex-col sm:flex-row sm:items-center justify-between mb-6 gap-3">
      <div><h2 class="text-2xl font-bold text-gray-900">All Leads</h2><p class="text-gray-500 text-sm mt-1">${leads.length} total</p></div>
      <select id="allLeadFilter" onchange="filterAllLeads()" class="px-3 py-2 border border-gray-300 rounded-lg text-sm outline-none">
        <option value="">All Status</option>${LEAD_STATUSES.map(s => `<option value="${s}">${s.replace('_',' ').replace(/\b\w/g, c => c.toUpperCase())}</option>`).join('')}
      </select>
    </div>
    <div class="bg-white rounded-xl border border-gray-200 overflow-hidden">
      <div class="overflow-x-auto"><table class="w-full text-sm"><thead><tr class="bg-gray-50 border-b border-gray-200 text-left text-gray-500">
        <th class="px-5 py-3 font-medium">Contact</th><th class="px-5 py-3 font-medium">Company</th><th class="px-5 py-3 font-medium">Phone</th><th class="px-5 py-3 font-medium">By</th><th class="px-5 py-3 font-medium">Status</th><th class="px-5 py-3 font-medium">Date</th><th class="px-5 py-3"></th>
      </tr></thead><tbody>
        ${leads.map(l => `<tr class="border-b border-gray-50 hover:bg-gray-50 cursor-pointer all-lead-row" data-status="${l.status}" onclick="location.hash='#lead/${l._id}'">
          <td class="px-5 py-3.5 font-medium text-gray-900">${esc(l.contactName)}</td>
          <td class="px-5 py-3.5 text-gray-600">${esc(l.company || '-')}</td>
          <td class="px-5 py-3.5 text-gray-600">${esc(l.phone || '-')}</td>
          <td class="px-5 py-3.5 text-gray-600">${esc(l.userName || '-')}</td>
          <td class="px-5 py-3.5">${leadStatusBadge(l.status)}</td>
          <td class="px-5 py-3.5 text-gray-500">${formatDate(l.createdAt)}</td>
          <td class="px-5 py-3.5"><i data-lucide="chevron-right" class="w-4 h-4 text-gray-400"></i></td>
        </tr>`).join('')}
      </tbody></table></div>
    </div>`;
    lucide.createIcons();
  } catch (err) { container.innerHTML = `<p class="text-red-500 p-4">${esc(err.message)}</p>`; }
}

window.filterAllLeads = () => {
  const filter = document.getElementById('allLeadFilter').value;
  document.querySelectorAll('.all-lead-row').forEach(row => { row.style.display = (!filter || row.dataset.status === filter) ? '' : 'none'; });
};


function esc(str) {
  if (!str) return '';
  const div = document.createElement('div');
  div.textContent = String(str);
  return div.innerHTML;
}

init();
</script>
</body>
</html>
